services:
  # Database - Using Render's PostgreSQL (better supported)
  - type: pserv
    name: erpnext-db
    plan: free
    runtime: image
    image:
      url: postgres:15
    envVars:
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: erpnext
      - key: POSTGRES_USER
        value: erpnext

  # Redis Cache
  - type: pserv
    name: erpnext-redis
    plan: free
    runtime: image
    image:
      url: redis:7-alpine

  # Main ERPNext Application
  - type: web
    name: erpnext-app
    plan: free
    runtime: image
    image:
      url: frappe/erpnext:v15
    envVars:
      - key: POSTGRES_HOST
        fromService:
          name: erpnext-db
          type: pserv
          property: host
      - key: POSTGRES_PORT
        fromService:
          name: erpnext-db
          type: pserv
          property: port
      - key: REDIS_HOST
        fromService:
          name: erpnext-redis
          type: pserv
          property: host
      - key: REDIS_PORT
        fromService:
          name: erpnext-redis
          type: pserv
          property: port
